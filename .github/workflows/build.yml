name: Build

permissions:
  contents: write

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: choosegoose:${{ github.ref_name }}-${{ github.sha }}

    steps:
    - uses: actions/checkout@v6

    - name: Build the Docker image
      run: make all

    - name: Upload Linux binaries
      uses: actions/upload-artifact@v6
      with:
        name: linux-binaries
        path: build/Linux*/bin

    - name: Upload RG35XX demos
      uses: actions/upload-artifact@v6
      with:
        name: RG35XX-demos
        path: build/RG35XX/demos

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache dependencies
        uses: actions/cache@v5
        id: cache-deps
        with:
          path: ./vendor
          key: ${{ hashFiles('static-compile-deps.sh') }}

      - name: Compile dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          bash static-compile-deps.sh

      - name: Cache font
        uses: actions/cache@v5
        id: cache-font
        with:
          path: ./build/font
          key: font

      - name: Download font
        run: |
          make font-download

      - name: Compile app
        id: compile-app
        run: |
          make choosegoose
          binpath=$(make echo-bin-path)
          echo "binpath=$binpath" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: bash smoke-test.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: macos-binaries
          path: ${{ steps.compile-app.outputs.binpath }}

      - name: Publish release binaries
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            build/Darwin**/*
            ${{ steps.compile-app.outputs.binpath }}
